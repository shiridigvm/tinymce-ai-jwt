  <script type="text/javascript">
    // =====================================================================
    // CONFIGURE THIS: Set to your Render.com JWT server URL

    const JWT_SERVER_URL = 'https://tinymce-ai-jwt.onrender.com';

    const API_URL = 'https://demouserdirectory.tiny.cloud/v1/users';

    const mentions_fetch = async (query, success) => {
      try {
        const searchPhrase = query.term.toLowerCase();
        const users = (await (await fetch(`${API_URL}?q=${encodeURIComponent(searchPhrase)}`)).json());
        success(users.data);
      } catch (error) {
        console.log(error);
      }
    };

    const mentions_menu_complete = (editor, userInfo) => {
      const span = editor.getDoc().createElement('span');
      span.className = 'mymention';
      span.setAttribute('data-mention-id', userInfo.id);
      span.appendChild(editor.getDoc().createTextNode('@' + userInfo.name));
      return span;
    };

    const mentions_select = async (mention, success) => {
      const id = mention.getAttribute('data-mention-id');
      try {
        const employee = await (await fetch(`${API_URL}/${id}`)).json();

        const div = document.createElement('div');
        div.innerHTML = (
          '<div class="card">' +
          '<img class="avatar" src="' + employee.image + '">' +
          '<h1>' + employee.name + '</h1>' +
          '<p>' + employee.description + '</p>' +
          '</div>'
        );
        success(div);
      } catch (error) {
        console.error(error);
      }
    };

    const mentions_menu_hover = async (userInfo, success) => {
      const div = document.createElement('div');
      div.innerHTML = (
        '<div class="card">' +
        '<img class="avatar" src="' + userInfo.image + '">' +
        '<h1>' + userInfo.name + '</h1>' +
        '<p>' + userInfo.description + '</p>' +
        '</div>'
      );
      success(div);
    };

        menu: {

          edit: { title: 'Edit', items: 'undo redo cut copy paste pastetext selectall searchreplace' },
          insert: { title: 'Insert', items: 'insertfile accordion anchor charmap math codesample hr image insertdatetime | addtemplate inserttemplate | link unlink openlink | footnotes footnotesupdate |media nonbreaking pagebreak tableofcontents checklist template mergetags' },

        quickbars_selection_toolbar: 'tinymceai-chat tinymceai-review tinymceai-quickactions | bold italic | blocks | quicklink quicktable quickimage blockquote',

        // The new AI plugin is now working on fiddle one just needs to generate a new JWT token every 24 hours on a fiddle to try things 
        // out here is an example fiddle: https://fiddle.tiny.cloud/fUvo8MfzI7/0 
        // new JWT tokens can be generated using this little tool: https://tinyai-demo.tiugo-preview.tiny.cloud/jwt_token_generator_demo.html

            type: 'action',
            title: 'Convert to Table',
            prompt: 'Convert this data into an HTML table',

            type: 'chat',
            title: 'Explain Like I\'m 5',
            prompt: 'Explain the selected content as if I am a 5 year old child'

        tinymceai_chat_welcome_message: '<p><strong>Welcome to AI Chat!</strong></p><p>I can help you write, edit, review, and brainstorm. Ask me anything or use the quick actions above.</p>',

        // tinymceai_chat_fetch_sources — Provides a list of external sources users can attach
        // Returns Promise<ExternalSourcesList[]>
        tinymceai_chat_fetch_sources: () => {
          console.log('[tinymceai] tinymceai_chat_fetch_sources called');
          return Promise.resolve([
            {
              label: 'Sample Documents',
              icon: 'document-properties',
              sources: [
                { label: 'Company Guidelines', id: 'doc-guidelines', type: 'web-resource' },
                { label: 'Product Roadmap', id: 'doc-roadmap', type: 'file' },
                { label: 'FAQ Document', id: 'doc-faq', type: 'web-resource' }
              ]
            }
          ]);
        },

        // tinymceai_chat_fetch_source — Fetches a specific external source by ID
        // Returns Promise<ExternalContextSource> — { type: 'file', file: File } or { type: 'web-resource', url: string }
        tinymceai_chat_fetch_source: (id) => {
          console.log('[tinymceai] tinymceai_chat_fetch_source called with id:', id);
          if (id === 'doc-guidelines') {
            return Promise.resolve({ type: 'web-resource', url: 'https://www.tiny.cloud' });
          } else if (id === 'doc-roadmap') {
            const blob = new Blob(['Sample roadmap content for testing'], { type: 'text/plain' });
            const file = new File([blob], 'roadmap.txt', { type: 'text/plain' });
            return Promise.resolve({ type: 'file', file: file });
          } else {
            return Promise.resolve({ type: 'web-resource', url: 'https://www.tiny.cloud/docs' });

    function toggleEditorMode(mode) {
      const editor = tinymce.activeEditor;
      if (!editor) {
        return;
      }
      // TinyMCE 6+ uses editor.mode.set(...)
      if (editor.mode && typeof editor.mode.set === 'function') {
        editor.mode.set(mode);
        return;
      }
      if (typeof editor.setMode === 'function') {
        editor.setMode(mode);
      }
    }

  <script>
    document
      .querySelector(".showGetContent")
      .addEventListener("click", function () {
        if (tinymce.activeEditor.ui) {
          tinymce.activeEditor.windowManager.open({
            size: "large",
            title: "Get Content",
            body: {
              type: "panel",
              items: [
                {
                  type: "textarea",
                  flex: true,
                  name: "getcontent",
                  label: "Content",
                },
              ],
            },
            buttons: [],
            initialData: {
              getcontent: tinymce.activeEditor.getContent(),
            },
          });
        } else {
          tinymce.activeEditor.windowManager.alert(
            tinymce.activeEditor.getContent()
          );
        }
      });
    document.querySelector('.showMarkGetContent').addEventListener('click', async function () {
      const content = await tinymce.activeEditor.plugins.markdown.getContent();
      if (tinymce.activeEditor.ui) {
        tinymce.activeEditor.windowManager.open({
          size: 'large',
          title: 'Get Markdown Content',
          body: {
            type: 'panel',
            items: [
              {
                type: 'textarea',
                flex: true,
                name: 'getmarkcontent',
                label: 'Content'
              }
            ]
          },
          buttons: [],
          initialData: {
            getmarkcontent: content
          }
        });
      } else {
        tinymce.activeEditor.windowManager.alert(content);
      }
    });
    document
      .querySelector(".setContent")
      .addEventListener("click", function () {
        if (tinymce.activeEditor.ui) {
          tinymce.activeEditor.windowManager.open({
            size: "large",
            title: "Set Content",
            body: {
              type: "panel",
              items: [
                {
                  type: "textarea",
                  flex: true,
                  name: "setcontent",
                  label: "Content",
                },
              ],
            },
            buttons: [
              {
                type: "custom",
                name: "set",
                text: "Set Content",
              },
            ],
            initialData: {
              getcontent: "",
            },
            onAction: function (api, data) {
              if (data.name === "set") {
                tinymce.activeEditor.setContent(api.getData().setcontent);
                api.close();
              }
            },
          });
        }
      });
  </script>
